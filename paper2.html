<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPSC CCS Pre 2026 — GS Paper II Mock Test</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --card: #1a1a2e;
    --border: #2a2a45;
    --gold: #e8b84b;
    --gold-dim: #9a7828;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --text: #e2e2f0;
    --muted: #7878a0;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans', 'Noto Sans Devanagari', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 30% 20%, #1a1040 0%, #0d0d14 60%);
  }

  .emblem {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #e8b84b, #c8960a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2em;
    margin-bottom: 20px;
    box-shadow: 0 0 40px #e8b84b44;
  }

  .intro-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5em;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .intro-sub {
    color: var(--muted);
    text-align: center;
    font-size: 0.85em;
    margin-top: 6px;
    margin-bottom: 28px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 28px;
  }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }

  .info-card .val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5em;
    font-weight: 700;
    color: var(--gold);
  }

  .info-card .lbl {
    font-size: 0.72em;
    color: var(--muted);
    margin-top: 2px;
  }

  .start-btn {
    background: linear-gradient(135deg, #e8b84b, #c8960a);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1em;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px #e8b84b44;
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px #e8b84b55; }

  #test-screen, #result-screen { display: none; }

  .test-header {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 0.95em;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .timer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05em;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    min-width: 72px;
    text-align: center;
  }

  .timer.urgent { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .progress-wrap {
    flex: 1;
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 4px;
    transition: width 0.3s;
  }

  .q-counter {
    font-size: 0.8em;
    color: var(--muted);
    white-space: nowrap;
  }

  .q-body {
    padding: 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .q-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8em;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .q-text {
    font-size: 0.95em;
    line-height: 1.7;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
  }

  .option:hover { border-color: var(--gold-dim); background: #1d1d35; }

  .option.selected {
    border-color: var(--gold);
    background: #1f1b08;
  }

  .option.correct-ans { border-color: var(--green); background: #052e16; }
  .option.wrong-ans { border-color: var(--red); background: #2d0a0a; }

  .opt-letter {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9em;
    color: var(--muted);
    min-width: 24px;
    padding-top: 1px;
  }

  .option.selected .opt-letter { color: var(--gold); }
  .option.correct-ans .opt-letter { color: var(--green); }
  .option.wrong-ans .opt-letter { color: var(--red); }

  .opt-text { font-size: 0.9em; line-height: 1.5; }

  .nav-bar {
    position: sticky; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    justify-content: space-between;
    align-items: center;
  }

  .btn {
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95em; font-weight: 600;
    padding: 10px 20px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-prev { background: var(--border); color: var(--text); }
  .btn-prev:hover { background: #3a3a60; }

  .btn-next { background: var(--gold); color: #000; }
  .btn-next:hover { background: #d4a340; }

  .btn-submit {
    background: var(--green);
    color: #000;
    flex: 1;
  }

  .btn-submit:hover { background: #16a34a; }

  .btn-skip { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 0.82em; padding: 8px 14px; }
  .btn-skip:hover { color: var(--text); border-color: var(--muted); }

  .palette-wrap {
    padding: 12px 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  .palette-title {
    font-size: 0.75em;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .palette {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .p-dot {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75em;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform 0.1s;
    background: var(--border);
    color: var(--muted);
  }

  .p-dot:hover { transform: scale(1.1); }
  .p-dot.answered { background: var(--gold); color: #000; }
  .p-dot.current { border-color: var(--white); }

  #result-screen {
    min-height: 100vh;
    padding: 24px 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  .result-header {
    text-align: center;
    margin-bottom: 24px;
  }

  .result-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4em;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .score-ring {
    width: 130px; height: 130px;
    border-radius: 50%;
    border: 6px solid var(--gold);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 20px auto;
    box-shadow: 0 0 40px #e8b84b33;
    background: radial-gradient(circle, #1a1a2e, #0d0d14);
  }

  .score-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.2em;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .score-label { font-size: 0.72em; color: var(--muted); margin-top: 4px; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .r-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }

  .r-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6em;
    font-weight: 700;
  }

  .r-lbl { font-size: 0.7em; color: var(--muted); margin-top: 3px; }

  .review-section { margin-top: 20px; }

  .review-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    color: var(--gold);
    font-size: 1em;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .review-item.r-correct { border-left: 3px solid var(--green); }
  .review-item.r-wrong { border-left: 3px solid var(--red); }
  .review-item.r-skip { border-left: 3px solid var(--muted); }

  .review-q-num { font-size: 0.72em; color: var(--muted); margin-bottom: 5px; }
  .review-q-text { font-size: 0.88em; margin-bottom: 8px; line-height: 1.5; }
  .review-ans {
    font-size: 0.8em;
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  .ans-badge {
    padding: 2px 8px; border-radius: 4px; font-weight: 600;
  }

  .ans-your { background: #2d1b00; color: #fbbf24; }
  .ans-correct { background: #052e16; color: #4ade80; }
  .ans-skip { background: #1a1a2e; color: #7878a0; }

  .retake-btn {
    background: linear-gradient(135deg, #e8b84b, #c8960a);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1em;
    font-weight: 700;
    cursor: pointer;
    display: block;
    margin: 20px auto;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px #e8b84b44;
  }

  .filter-btns {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  }

  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 14px;
    font-size: 0.8em; cursor: pointer; color: var(--text);
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }
</style>
</head>
<body>

<div id="intro">
  <div class="emblem">⚖️</div>
  <div class="intro-title">JPSC Civil Services Pre 2026</div>
  <div class="intro-sub">सामान्य अध्ययन प्रश्न पत्र — II (Jharkhand GK) &nbsp;|&nbsp; सीरीज C</div>
  <div class="info-grid">
    <div class="info-card"><div class="val">100</div><div class="lbl">प्रश्न</div></div>
    <div class="info-card"><div class="val">200</div><div class="lbl">कुल अंक</div></div>
    <div class="info-card"><div class="val">2 घंटे</div><div class="lbl">अवधि</div></div>
    <div class="info-card"><div class="val">0</div><div class="lbl">नेगेटिव मार्किंग</div></div>
  </div>
  <button class="start-btn" onclick="startTest()">टेस्ट शुरू करें ▶</button>
</div>

<div id="test-screen">
  <div class="test-header">
    <div class="header-title">JPSC GS-II (Jharkhand)</div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="q-counter" id="q-counter">0/100</div>
    <div class="timer" id="timer">2:00:00</div>
  </div>

  <div class="q-body">
    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Q 1 / 100</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="palette-wrap">
      <div class="palette-title">प्रश्न पैलेट</div>
      <div class="palette" id="palette"></div>
    </div>
  </div>

  <div class="nav-bar">
    <button class="btn btn-prev" onclick="navigate(-1)">◀ पिछला</button>
    <button class="btn btn-skip" onclick="navigate(1)">छोड़ें</button>
    <button class="btn btn-next" onclick="navigate(1)">अगला ▶</button>
    <button class="btn btn-submit" onclick="confirmSubmit()">जमा करें</button>
  </div>
</div>

<div id="result-screen">
  <div class="result-header">
    <div class="result-title">परिणाम</div>
    <div id="verdict" style="font-size:0.85em;color:var(--muted);margin-top:4px;">JPSC GS Paper-II</div>
    <div class="score-ring">
      <div class="score-num" id="final-score">0</div>
      <div class="score-label">200 में से</div>
    </div>
  </div>

  <div class="result-grid">
    <div class="r-card"><div class="r-val" id="r-correct" style="color:var(--green)">0</div><div class="r-lbl">सही</div></div>
    <div class="r-card"><div class="r-val" id="r-wrong" style="color:var(--red)">0</div><div class="r-lbl">गलत</div></div>
    <div class="r-card"><div class="r-val" id="r-skip" style="color:var(--muted)">0</div><div class="r-lbl">छोड़े गए</div></div>
  </div>

  <button class="retake-btn" onclick="retake()">🔄 दोबारा टेस्ट दें</button>

  <div class="review-section">
    <div class="review-title">विस्तृत समीक्षा</div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="filterReview('all',this)">सभी</button>
      <button class="filter-btn" onclick="filterReview('wrong',this)">गलत</button>
      <button class="filter-btn" onclick="filterReview('skip',this)">छोड़े गए</button>
      <button class="filter-btn" onclick="filterReview('correct',this)">सही</button>
    </div>
    <div id="review-list"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  { q: "1. झारखंड में पेसा (PESA), 1996 का महत्व निम्नलिखित में से कौन सही रूप में स्पष्ट करता है?", opts: ["यह प्रथागत कानूनों को समाप्त करता है।","यह स्थानीय संसाधनों पर ग्राम सभा के नियंत्रण को सुदृढ़ करता है।","यह शहरी निकायों को बढ़ावा देता है।","यह शक्ति को राज्य से केन्द्र को हस्तान्तरित करता है।"], ans: 1 },
  { q: "2. सारन्दा वन क्षेत्र प्रायः समाचार में है क्योंकि इसका महत्व है:", opts: ["यह भारत का सबसे बड़ा टाइगर रिजर्व है।","सर्वोच्च न्यायालय का इसे वन्यजीव अभ्यारण्य बनाने का निर्देश","यह रामसर आर्द्र भूमि है।","यह पूर्णतः गैर अनुसूचित क्षेत्र में स्थित है।"], ans: 1 },
  { q: "3. संथाल परगना काश्तकारी अधिनियम 1949 के अन्तर्गत संथाल परगना खंड गठित है:", opts: ["दुमका, साहिबगंज, गोड्डा और देवघर","गुमला, गड़वा, गिरिडीह, पाकुड़","धनबाद, जामताड़ा, बोकारो, हजारीबाग","लातेहर, लोहरदगा, चतरा, पलामू"], ans: 0 },
  { q: "4. संवैधानिक दृष्टिकोण से संथाल परगना काश्तकारी अधिनियम, 1949 में सर्वाधिक किससे जुड़ा है?", opts: ["अनुच्छेद 14 - विधि के समक्ष समानता","अनुच्छेद 19 - आवागमन की स्वतंत्रता","अनुच्छेद 244 - अनुसूचित क्षेत्रों का प्रशासन","अनुच्छेद 300A - सम्पत्ति का अधिकार"], ans: 2 },
  { q: "5. छोटा नागपुर काश्तकारी अधिनियम 1908 के अन्तर्गत जनजातीय भूमि का गैर-जनजातियों को हस्तान्तरण है:", opts: ["स्वतंत्र रूप से अनुमन्य","ग्राम की सहमति से अनुमन्य","सामान्यतः निषिद्ध (सीमित अपवादों सहित)","पंजीकरण के बाद अनुमन्य"], ans: 2 },
  { q: "6. छोटा नागपुर काश्तकारी अधिनियम 1908 के अन्तर्गत अवैध रूप से हस्तांतरित जनजातीय भूमि को पुर्नस्थापित करने का अधिकार किसे है?", opts: ["उच्च न्यायालय","उपायुक्त (Deputy Commissioner)","ग्राम सभा","राज्य विधान मंडल"], ans: 1 },
  { q: "7. छोटा नागपुर काश्तकारी अधिनियम 1908 निम्नलिखित में से किस भू-स्वामित्व प्रणाली को मान्यता देता है?", opts: ["रैयतवारी","महालवारी","मुंडारी खुंटकट्टी","जमींदारी"], ans: 2 },
  { q: "8. संथाल परगना काश्तकारी अधिनियम 1949 के अन्तर्गत जनजातीय भूमि की पुर्नस्थापना:", opts: ["विवेकाधीन है","समय सीमा से बाधित है","सामान्यतः अनिवार्य है","राज्यपाल की स्वीकृति आवश्यक है"], ans: 2 },

];

// Potential key based on logic and Jharkhand GK
const ANSWER_KEY = [1,1,0,2,2,1,2,2,1,1,2,1,2,1,2,1,1,1,1,1,3,2,0,1,1,1,0,1,0,0,3,1,1,3,0,0,2,2,0,2,1,0,2,1,0,2,0,0,2,0,2,3,1,0,1,3,1,1,0,0,1,3,2,0,2,1,0,1,3,0,1,0,1,0,0,0,1,1,2,2,2,1,2,1,0,1,0,2,0,1,0,3,1,0,1,1,0,0,0,2];

let currentQ = 0;
let answers = new Array(100).fill(-1);
let timerInterval;
let timeLeft = 7200;
let testStarted = false;
let reviewData = [];

function startTest() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('test-screen').style.display = 'block';
  buildPalette();
  renderQuestion();
  startTimer();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); return; }
    const h = Math.floor(timeLeft/3600);
    const m = Math.floor((timeLeft%3600)/60);
    const s = timeLeft%60;
    const el = document.getElementById('timer');
    el.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (timeLeft <= 300) el.classList.add('urgent');
  }, 1000);
}

function buildPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  for (let i = 0; i < 100; i++) {
    const d = document.createElement('div');
    d.className = 'p-dot' + (i===0?' current':'');
    d.id = 'pd-'+i;
    d.textContent = i+1;
    d.onclick = () => { currentQ = i; renderQuestion(); };
    pal.appendChild(d);
  }
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('q-num').textContent = `Q ${currentQ+1} / 100`;
  document.getElementById('q-text').innerHTML = q.q; 
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[currentQ]===i?' selected':'');
    div.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    div.onclick = () => selectAnswer(i);
    opts.appendChild(div);
  });
  document.querySelectorAll('.p-dot').forEach((d,i) => {
    d.classList.toggle('current', i===currentQ);
    d.classList.toggle('answered', answers[i]!==-1);
  });
  const answered = answers.filter(a=>a!==-1).length;
  document.getElementById('progress-fill').style.width = (answered/100*100)+'%';
  document.getElementById('q-counter').textContent = `${answered}/100`;
  const pd = document.getElementById('pd-'+currentQ);
  if (pd) pd.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function selectAnswer(i) {
  answers[currentQ] = i;
  renderQuestion();
}

function navigate(dir) {
  currentQ = Math.max(0, Math.min(99, currentQ + dir));
  renderQuestion();
}

function confirmSubmit() {
  const unanswered = answers.filter(a=>a===-1).length;
  if (unanswered > 0) {
    if (!confirm(`आपने ${unanswered} प्रश्नों के उत्तर नहीं दिए हैं। क्या आप सबमिट करना चाहते हैं?`)) return;
  }
  submitTest();
}

function submitTest() {
  clearInterval(timerInterval);
  document.getElementById('test-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  calculateResult();
}

function calculateResult() {
  let correct = 0, wrong = 0, skip = 0;
  reviewData = [];
  answers.forEach((ans, i) => {
    const correctAns = ANSWER_KEY[i];
    let status;
    if (ans === -1) { skip++; status = 'skip'; }
    else if (ans === correctAns) { correct++; status = 'correct'; }
    else { wrong++; status = 'wrong'; }
    reviewData.push({ qNum: i+1, q: QUESTIONS[i].q, opts: QUESTIONS[i].opts, yourAns: ans, correctAns, status });
  });
  const score = correct * 2;
  document.getElementById('final-score').textContent = score;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skip;
  const pct = (score/200*100).toFixed(1);
  document.getElementById('verdict').textContent = `स्कोर: ${score}/200 (${pct}%)`;
  renderReview('all');
}

function renderReview(filter) {
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];
  reviewData.forEach(item => {
    if (filter !== 'all' && item.status !== filter) return;
    const div = document.createElement('div');
    div.className = `review-item r-${item.status}`;
    let ansHtml = '';
    if (item.status === 'skip') {
      ansHtml = `<span class="ans-badge ans-skip">छोड़ा गया</span><span class="ans-badge ans-correct">✓ सही: ${letters[item.correctAns]}: ${item.opts[item.correctAns]}</span>`;
    } else if (item.status === 'correct') {
      ansHtml = `<span class="ans-badge ans-correct">✓ सही उत्तर: ${letters[item.yourAns]}: ${item.opts[item.yourAns]}</span>`;
    } else {
      ansHtml = `<span class="ans-badge ans-your">✗ आपका: ${letters[item.yourAns]}: ${item.opts[item.yourAns]}</span><span class="ans-badge ans-correct">✓ सही: ${letters[item.correctAns]}: ${item.opts[item.correctAns]}</span>`;
    }
    div.innerHTML = `<div class="review-q-num">प्रश्न ${item.qNum}</div><div class="review-q-text">${item.q}</div><div class="review-ans">${ansHtml}</div>`;
    list.appendChild(div);
  });
}

function filterReview(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(filter);
}

function retake() {
  answers = new Array(100).fill(-1);
  currentQ = 0;
  timeLeft = 7200;
  reviewData = [];
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('test-screen').style.display = 'block';
  document.getElementById('timer').classList.remove('urgent');
  buildPalette();
  renderQuestion();
  startTimer();
}
</script>
